# ~/.config/kitty/kitty.conf
# Font: IosevkaTerm Nerd Font
font_family      IosevkaTerm Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# UI / behavior
enable_audio_bell no
visual_bell_duration 0
window_padding_width 10
confirm_os_window_close 1
scrollback_lines 10000
copy_on_select yes

# Cursor
cursor_shape block
cursor_blink_interval 0

# Opaque terminal
background_opacity 1.0

# Catppuccin Mocha Verdant
# Green-shifted Catppuccin Mocha palette adapted from
# catppuccin-mocha-verdant.toml (Alacritty).
foreground              #c9dccb
background              #07110d
selection_foreground    #e4f1e5
selection_background    #1b3a2d

cursor                  #a6e3a1
cursor_text_color       #07110d
url_color               #7fb7a7

# Tabs
active_tab_foreground   #07110d
active_tab_background   #a6e3a1
inactive_tab_foreground #c9dccb
inactive_tab_background #12271e
tab_bar_background      #0b1812

# ANSI palette
color0  #0b1812
color8  #486052
color1  #e88a9c
color9  #f38ba8
color2  #8fd694
color10 #a6e3a1
color3  #dccb88
color11 #f9e2af
color4  #7fb7a7
color12 #89dceb
color5  #b79ad8
color13 #cba6f7
color6  #79c9b7
color14 #94e2d5
color7  #b8c9ba
color15 #e4f1e5

# Extended 256-color palette
color16 #fab387
color17 #f5a97f

underline_color #7fb7a7

# Match system theme preference a bit (optional)
# macos_titlebar_color system
# linux_display_server wayland

# Handy keybinds (optional)
map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_window
map ctrl+shift+]     next_tab
map ctrl+shift+[     previous_tab

allow_remote_control yes

tab_bar_edge top
tab_bar_style powerline
