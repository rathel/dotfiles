# ~/.config/foot/foot.ini

[main]
font=IosevkaTerm Nerd Font:size=12
pad=10x10
selection-target=clipboard

[bell]
system=no
visual=no

[scrollback]
lines=10000

[cursor]
style=block
blink=no

# Catppuccin Mocha Verdant, matching ~/.config/kitty/kitty.conf
[colors-dark]
alpha=1.0
cursor=07110d a6e3a1
foreground=c9dccb
background=07110d

regular0=0b1812
regular1=e88a9c
regular2=8fd694
regular3=dccb88
regular4=7fb7a7
regular5=b79ad8
regular6=79c9b7
regular7=b8c9ba

bright0=486052
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89dceb
bright5=cba6f7
bright6=94e2d5
bright7=e4f1e5

16=fab387
17=f5a97f

selection-foreground=e4f1e5
selection-background=1b3a2d

search-box-no-match=07110d e88a9c
search-box-match=e4f1e5 1b3a2d

jump-labels=07110d fab387
urls=7fb7a7

# foot has no native panes or tabs, so these shortcuts use OS windows.
[key-bindings]
spawn-terminal=Control+Shift+Return Control+Shift+t
quit=Control+Shift+w
